<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas - CMMS</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ v }}">
    <link rel="stylesheet" href="/static/css/sidebar.css?v={{ v }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-disponible { background: #4caf50; }
        .status-en-uso { background: #FF9F0A; }
        .status-mantenimiento { background: #f44336; }

        .tool-card {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #444;
            transition: transform 0.2s;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            border-color: #0A84FF;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .tools-table-wrap {
            margin-top: 20px;
            border: 1px solid #2f3d53;
            border-radius: 10px;
            overflow: auto;
            background: #151b26;
        }

        .tools-table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
        }

        .tools-table th,
        .tools-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: left;
            color: #d8e6fa;
            font-size: 0.9rem;
        }

        .tools-table th {
            background: #213147;
            color: #9be8ff;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: .03em;
        }

        .view-toggle {
            display: inline-flex;
            border: 1px solid #355173;
            border-radius: 8px;
            overflow: hidden;
            margin-left: 10px;
        }

        .view-toggle button {
            border: none;
            padding: 8px 12px;
            background: #18263a;
            color: #cfe2ff;
            cursor: pointer;
        }

        .view-toggle button.active {
            background: #0A84FF;
            color: #04262b;
            font-weight: 700;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="logo-details">
            <i class="fas fa-industry icon"></i>
            <div class="logo_name">CMMS Pro</div>
            <i class="fas fa-bars" id="btn_toggle"></i>
        </div>
        <ul class="nav-list"></ul>
    </nav>

    <section class="home-section">
        <div class="top-bar">
            <h1><i class="fas fa-wrench"></i> Catalogo de Herramientas</h1>
        </div>

        <div class="main-container">
            <div class="container-fluid">
                <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                    <div style="background: linear-gradient(135deg, #1e3a5f 0%, #2a5298 100%); border-radius: 12px; padding: 20px; min-width: 180px; flex: 1;">
                        <div style="color: #a0c4ff; font-size: 0.85em; text-transform: uppercase;">Total Herramientas</div>
                        <div id="kpiTotal" style="font-size: 2.5em; font-weight: bold; color: #fff;">0</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%); border-radius: 12px; padding: 20px; min-width: 180px; flex: 1;">
                        <div style="color: #b7e4c7; font-size: 0.85em; text-transform: uppercase;">Disponibles</div>
                        <div id="kpiAvailable" style="font-size: 2.5em; font-weight: bold; color: #fff;">0</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #4a1942 0%, #7b2869 100%); border-radius: 12px; padding: 20px; min-width: 180px; flex: 1;">
                        <div style="color: #ffb6c1; font-size: 0.85em; text-transform: uppercase;">En Uso</div>
                        <div id="kpiInUse" style="font-size: 2.5em; font-weight: bold; color: #fff;">0</div>
                    </div>
                </div>

                <div class="toolbar">
                    <button class="btn-primary" data-perm="herramientas.create" onclick="openToolModal()"><i class="fas fa-plus"></i> Nueva Herramienta</button>
                    <button class="btn-secondary" data-perm="herramientas.export" onclick="downloadToolsExcel()"><i class="fas fa-file-excel"></i> Exportar Excel</button>
                    <button class="btn-secondary" data-perm="herramientas.import" onclick="downloadTemplate()"><i class="fas fa-download"></i> Descargar Plantilla</button>
                    <button class="btn-secondary" data-perm="herramientas.import" onclick="triggerImport()"><i class="fas fa-file-import"></i> Carga Masiva</button>
                    <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importToolsFile(this)">
                    <div class="search-bar" style="max-width: 260px;">
                        <input type="text" id="searchTools" placeholder="Buscar herramienta..." onkeyup="filterTools()">
                    </div>
                    <label style="display: flex; align-items: center; gap: 5px; color: #aaa;">
                        <input type="checkbox" id="showInactive" onchange="loadTools()"> Mostrar inactivos
                    </label>
                    <div class="view-toggle">
                        <button id="btnCards" class="active" onclick="setToolsView('cards')"><i class="fas fa-th-large"></i> Tarjetas</button>
                        <button id="btnList" onclick="setToolsView('list')"><i class="fas fa-list"></i> Lista</button>
                    </div>
                </div>

                <div class="tools-grid" id="toolsGrid"></div>

                <div id="toolsTableWrap" class="tools-table-wrap" style="display:none;">
                    <table class="tools-table" id="toolsTable">
                        <thead>
                            <tr>
                                <th>Codigo</th>
                                <th>Nombre</th>
                                <th>Categoria</th>
                                <th>Estado</th>
                                <th>Ubicacion</th>
                                <th>Activo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <dialog id="toolModal" class="modal" style="background: #252526; color: white; border: 1px solid #444; padding: 20px; border-radius: 8px; max-width: min(450px, 96vw); width: 96vw;">
        <h3 id="modalTitle"><i class="fas fa-wrench"></i> Nueva Herramienta</h3>
        <form id="toolForm">
            <input type="hidden" id="toolId">

            <div style="display: grid; gap: 15px;">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="toolName" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="toolCategory">
                        <option value="">- Seleccione -</option>
                        <option value="Manual">Manual</option>
                        <option value="Electrica">Electrica</option>
                        <option value="Neumatica">Neumatica</option>
                        <option value="Medicion">Medicion</option>
                        <option value="Corte">Corte</option>
                        <option value="Soldadura">Soldadura</option>
                        <option value="Seguridad">Seguridad</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descripcion</label>
                    <textarea id="toolDescription" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="toolStatus">
                        <option value="Disponible">Disponible</option>
                        <option value="En Uso">En Uso</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ubicacion</label>
                    <input type="text" id="toolLocation" placeholder="Ej: Gabinete B-2">
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button type="button" onclick="document.getElementById('toolModal').close()" class="btn-secondary">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </dialog>

    <script src="/static/js/sidebar.js?v={{ v }}"></script>
    <script>
        let tools = [];
        let toolsView = 'cards';

        document.addEventListener('DOMContentLoaded', () => {
            loadTools();
            document.getElementById('toolForm').onsubmit = saveTool;
        });

        async function loadTools() {
            const showInactiveEl = document.getElementById('showInactive');
            const showAll = showInactiveEl ? showInactiveEl.checked : false;
            const res = await fetch(`/api/tools${showAll ? '?all=true' : ''}`);
            tools = await res.json();
            renderTools();
            updateKPIs();
        }

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const tableWrap = document.getElementById('toolsTableWrap');
            const tbody = document.querySelector('#toolsTable tbody');

            grid.innerHTML = '';
            tbody.innerHTML = '';

            tools.forEach(tool => {
                const statusClass = tool.status === 'Disponible' ? 'status-disponible' :
                    tool.status === 'En Uso' ? 'status-en-uso' : 'status-mantenimiento';

                const card = document.createElement('div');
                card.className = 'tool-card';
                card.style.opacity = tool.is_active ? '1' : '0.5';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <strong style="color: #0A84FF;">${tool.code}</strong>
                        <span class="${statusClass}" style="padding: 3px 10px; border-radius: 10px; font-size: 0.8em;">${tool.status}</span>
                    </div>
                    <h4 style="margin: 0; color: #fff;">${tool.name}</h4>
                    <p style="margin: 0; color: #888; font-size: 0.9em;">${tool.description || 'Sin descripcion'}</p>
                    <div style="display: flex; gap: 10px; color: #aaa; font-size: 0.85em;">
                        <span><i class="fas fa-tag"></i> ${tool.category || 'N/A'}</span>
                        <span><i class="fas fa-map-marker-alt"></i> ${tool.location || 'N/A'}</span>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <button onclick="editTool(${tool.id})" class="btn-small"><i class="fas fa-edit"></i> Editar</button>
                        <button onclick="toggleTool(${tool.id})" class="btn-small" style="background: ${tool.is_active ? '#f44336' : '#4caf50'}">
                            <i class="fas fa-${tool.is_active ? 'ban' : 'check'}"></i> ${tool.is_active ? 'Desactivar' : 'Activar'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);

                const tr = document.createElement('tr');
                tr.style.opacity = tool.is_active ? '1' : '0.5';
                tr.innerHTML = `
                    <td style="color:#0A84FF; font-weight:700;">${tool.code}</td>
                    <td>${tool.name}</td>
                    <td>${tool.category || '-'}</td>
                    <td><span class="${statusClass}" style="padding:3px 10px; border-radius:999px; font-size:0.8em;">${tool.status}</span></td>
                    <td>${tool.location || '-'}</td>
                    <td>${tool.is_active ? 'SI' : 'NO'}</td>
                    <td>
                        <button onclick="editTool(${tool.id})" class="btn-small"><i class="fas fa-edit"></i></button>
                        <button onclick="toggleTool(${tool.id})" class="btn-small" style="background: ${tool.is_active ? '#f44336' : '#4caf50'}">
                            <i class="fas fa-${tool.is_active ? 'ban' : 'check'}"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            grid.style.display = toolsView === 'cards' ? 'grid' : 'none';
            tableWrap.style.display = toolsView === 'list' ? 'block' : 'none';

            filterTools();
        }

        function setToolsView(view) {
            toolsView = view;
            document.getElementById('btnCards').classList.toggle('active', view === 'cards');
            document.getElementById('btnList').classList.toggle('active', view === 'list');
            renderTools();
        }

        function updateKPIs() {
            const activeTools = tools.filter(t => t.is_active);
            document.getElementById('kpiTotal').textContent = activeTools.length;
            document.getElementById('kpiAvailable').textContent = activeTools.filter(t => t.status === 'Disponible').length;
            document.getElementById('kpiInUse').textContent = activeTools.filter(t => t.status === 'En Uso').length;
        }

        function filterTools() {
            const search = document.getElementById('searchTools').value.toLowerCase();
            document.querySelectorAll('.tool-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(search) ? '' : 'none';
            });
            document.querySelectorAll('#toolsTable tbody tr').forEach(tr => {
                const text = tr.textContent.toLowerCase();
                tr.style.display = text.includes(search) ? '' : 'none';
            });
        }

        function openToolModal() {
            document.getElementById('toolForm').reset();
            document.getElementById('toolId').value = '';
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-wrench"></i> Nueva Herramienta';
            document.getElementById('toolModal').showModal();
        }

        function editTool(id) {
            const tool = tools.find(t => t.id === id);
            if (!tool) return;

            document.getElementById('toolId').value = tool.id;
            document.getElementById('toolName').value = tool.name;
            document.getElementById('toolCategory').value = tool.category || '';
            document.getElementById('toolDescription').value = tool.description || '';
            document.getElementById('toolStatus').value = tool.status;
            document.getElementById('toolLocation').value = tool.location || '';

            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Editar Herramienta';
            document.getElementById('toolModal').showModal();
        }

        async function saveTool(e) {
            e.preventDefault();
            const id = document.getElementById('toolId').value;
            const data = {
                name: document.getElementById('toolName').value,
                category: document.getElementById('toolCategory').value || null,
                description: document.getElementById('toolDescription').value || null,
                status: document.getElementById('toolStatus').value,
                location: document.getElementById('toolLocation').value || null
            };

            const url = id ? `/api/tools/${id}` : '/api/tools';
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                document.getElementById('toolModal').close();
                loadTools();
            } else {
                alert('Error guardando herramienta');
            }
        }

        async function toggleTool(id) {
            if (!confirm('Cambiar estado de la herramienta?')) return;
            await fetch(`/api/tools/${id}`, { method: 'DELETE' });
            loadTools();
        }

        function downloadToolsExcel() {
            window.open('/api/tools/export', '_blank');
        }

        function downloadTemplate() {
            window.open('/api/tools/template', '_blank');
        }

        function triggerImport() {
            document.getElementById('importFile').click();
        }

        async function importToolsFile(input) {
            const file = input.files && input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/tools/import', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                if (!res.ok) {
                    alert('Error en importacion: ' + (data.error || 'desconocido'));
                    return;
                }

                alert(`Importacion completada. Nuevas: ${data.inserted || 0} | Duplicadas omitidas: ${data.skipped_duplicates || 0}`);
                loadTools();
            } catch (e) {
                alert('Error de red al importar: ' + e);
            } finally {
                input.value = '';
            }
        }
    </script>
</body>

</html>
