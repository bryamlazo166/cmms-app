<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - CMMS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body, input, button {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background gradient */
        .bg-glow {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(10,132,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(191,90,242,0.10) 0%, transparent 60%),
                #000;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(28,28,30,0.92);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            padding: 40px 40px 36px;
            width: min(400px, 92vw);
            backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.80), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #0A84FF, #5E5CE6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: #fff;
            box-shadow: 0 4px 14px rgba(10,132,255,0.40);
        }
        .logo-text h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: rgba(255,255,255,0.93);
            letter-spacing: -0.3px;
        }
        .logo-text p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.40);
            margin-top: 1px;
        }

        h2 {
            font-size: 1.55rem;
            font-weight: 700;
            color: rgba(255,255,255,0.93);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255,255,255,0.50);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.28);
            font-size: 0.85rem;
            pointer-events: none;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            height: 44px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 10px;
            color: rgba(255,255,255,0.90);
            font-size: 0.93rem;
            padding: 0 14px 0 38px;
            transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
            outline: none;
        }
        input:focus {
            border-color: rgba(10,132,255,0.70);
            background: rgba(10,132,255,0.08);
            box-shadow: 0 0 0 3px rgba(10,132,255,0.18);
        }
        input::placeholder { color: rgba(255,255,255,0.22); }

        /* Toggle password visibility */
        .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.28);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px;
            transition: color 150ms ease;
        }
        .toggle-pwd:hover { color: rgba(255,255,255,0.55); }

        .error-banner {
            background: rgba(255,69,58,0.14);
            border: 1px solid rgba(255,69,58,0.30);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.83rem;
            color: #FF6B61;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login {
            width: 100%;
            height: 46px;
            background: #0A84FF;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 150ms ease, transform 100ms ease, box-shadow 150ms ease;
            box-shadow: 0 4px 14px rgba(10,132,255,0.38);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            background: #228AFF;
            box-shadow: 0 6px 20px rgba(10,132,255,0.50);
        }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled {
            background: rgba(10,132,255,0.40);
            box-shadow: none;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.22);
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-industry"></i></div>
        <div class="logo-text">
            <h1>CMMS Pro</h1>
            <p>Sistema de Gestión de Mantenimiento</p>
        </div>
    </div>

    <h2>Iniciar sesión</h2>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>

    {% if error %}
    <div class="error-banner">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" id="loginForm">
        <div class="field">
            <label for="username">Usuario</label>
            <div class="input-wrap">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" placeholder="nombre de usuario"
                       autocomplete="username" autofocus required>
            </div>
        </div>

        <div class="field">
            <label for="password">Contraseña</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="••••••••"
                       autocomplete="current-password" required>
                <button type="button" class="toggle-pwd" onclick="togglePwd()" tabindex="-1">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
            <i class="fas fa-arrow-right-to-bracket"></i>
            Entrar
        </button>
    </form>

    <div class="footer">CMMS Pro &copy; 2026 &mdash; Acceso restringido a personal autorizado</div>
</div>

<script>
function togglePwd() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        pwd.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verificando...';
});
</script>
</body>
</html>
